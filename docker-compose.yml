name: tiara-stack

x-app-common: &app-common
  restart: unless-stopped
  healthcheck:
    test:
      [
        "CMD-SHELL",
        'node -e "fetch(''http://127.0.0.1:3000/live'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
      ]
    interval: 5s
    timeout: 5s
    retries: 20
    start_period: 30s

x-local-service-account-env: &local-service-account-env
  SERVICE_ACCOUNT_JWKS_URL: "http://local-jwks/.well-known/jwks.json"
  SERVICE_ACCOUNT_JWKS_AUTH_TOKEN_PATH: ""
  SERVICE_ACCOUNT_JWT_ISSUER: "tiara-compose"

secrets:
  postgres_password:
    file: ./deploy/compose/secrets/postgres-password
  redis_password:
    file: ./deploy/compose/secrets/redis-password

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_DB: tiara
      POSTGRES_USER: tiara
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - tiara-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiara -d tiara"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - sh
      - -ec
      - exec redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"
    secrets:
      - redis_password
    volumes:
      - tiara-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$(cat /run/secrets/redis_password)" ping']
      interval: 5s
      timeout: 5s
      retries: 20

  local-jwks:
    image: nginx:alpine
    restart: unless-stopped
    command:
      - sh
      - -ec
      - |
        mkdir -p /usr/share/nginx/html/.well-known
        cp /tmp/secrets/jwks.json /usr/share/nginx/html/.well-known/jwks.json
        exec nginx -g 'daemon off;'
    volumes:
      - type: bind
        source: ./deploy/compose/secrets/jwks.json
        target: /tmp/secrets/jwks.json
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost/.well-known/jwks.json >/dev/null || wget -q --spider http://localhost/.well-known/jwks.json",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  local-otel-sink:
    image: nginx:alpine
    restart: unless-stopped
    command:
      - sh
      - -ec
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 4318;
          location / {
            default_type application/json;
            return 200 '{}';
          }
        }
        EOF
        exec nginx -g 'daemon off;'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:4318/ >/dev/null || wget -q --spider http://localhost:4318/",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  sheet-auth:
    <<: *app-common
    build:
      context: ./packages/sheet-auth
    image: tiara-stack/sheet-auth:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      local-jwks:
        condition: service_healthy
      local-otel-sink:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      <<: *local-service-account-env
      BASE_URL: "${SHEET_AUTH_PUBLIC_BASE_URL:-http://localhost:3002}"
      TRUSTED_ORIGINS: "${TRUSTED_ORIGINS:-http://localhost:3001,http://localhost:3000,http://localhost:3002}"
      TRUSTED_OAUTH_CLIENT_IDS: "${TRUSTED_OAUTH_CLIENT_IDS:-}"
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      REDIS_BASE: "auth:"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://local-otel-sink:4318}
    secrets:
      - postgres_password
      - redis_password
    command:
      - sh
      - -ec
      - export POSTGRES_URL="postgres://tiara:$$(cat /run/secrets/postgres_password)@postgres:5432/tiara"; export REDIS_URL="redis://default:$$(cat /run/secrets/redis_password)@redis:6379"; exec node --use-openssl-ca --enable-source-maps ./dist/server.mjs

  sheet-db-server:
    <<: *app-common
    build:
      context: ./packages/sheet-db-server
    image: tiara-stack/sheet-db-server:local
    depends_on:
      postgres:
        condition: service_healthy
      local-jwks:
        condition: service_healthy
      local-otel-sink:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://local-otel-sink:4318}
    secrets:
      - postgres_password
    command:
      - sh
      - -ec
      - export POSTGRES_URL="postgres://tiara:$$(cat /run/secrets/postgres_password)@postgres:5432/tiara"; exec node --use-openssl-ca --enable-source-maps ./dist/index.mjs

  # Zero's image expects database URLs as environment variables and does not
  # support *_FILE secret inputs. This exposes the local dev Postgres password
  # through `docker compose config` and the container environment; other
  # services use /run/secrets/postgres_password where the image allows it.
  zero-cache:
    image: rocicorp/zero:1.5.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      sheet-db-server:
        condition: service_healthy
      local-jwks:
        condition: service_healthy
      local-otel-sink:
        condition: service_healthy
    environment:
      NODE_ENV: production
      ZERO_REPLICA_FILE: /data/zero.db
      ZERO_UPSTREAM_DB: "postgres://tiara:${POSTGRES_PASSWORD:?Run pnpm compose:generate-secrets or set POSTGRES_PASSWORD}@postgres:5432/tiara"
      ZERO_CVR_DB: "postgres://tiara:${POSTGRES_PASSWORD:?Run pnpm compose:generate-secrets or set POSTGRES_PASSWORD}@postgres:5432/tiara"
      ZERO_CHANGE_DB: "postgres://tiara:${POSTGRES_PASSWORD:?Run pnpm compose:generate-secrets or set POSTGRES_PASSWORD}@postgres:5432/tiara"
      ZERO_APP_PUBLICATIONS: "zero_data"
      ZERO_QUERY_FORWARD_COOKIES: "true"
      ZERO_QUERY_URL: "http://sheet-db-server:3000/zero/query"
      ZERO_MUTATE_FORWARD_COOKIES: "true"
      ZERO_MUTATE_URL: "http://sheet-db-server:3000/zero/mutate"
      ZERO_AUTH_JWKS_URL: "http://local-jwks/.well-known/jwks.json"
      ZERO_ADMIN_PASSWORD: ${ZERO_ADMIN_PASSWORD:-}
    volumes:
      - tiara-zero-cache-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:4848/keepalive >/dev/null || wget -q --spider http://localhost:4848/keepalive",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  sheet-apis:
    <<: *app-common
    build:
      context: ./packages/sheet-apis
    image: tiara-stack/sheet-apis:local
    depends_on:
      redis:
        condition: service_healthy
      zero-cache:
        condition: service_healthy
      sheet-auth:
        condition: service_healthy
      local-jwks:
        condition: service_healthy
      local-otel-sink:
        condition: service_healthy
    environment:
      <<: *local-service-account-env
      POD_NAME: sheet-apis-local
      POD_NAMESPACE: tiara-local
      SHEET_INGRESS_NAMESPACE: tiara-local
      ZERO_CACHE_SERVER: "http://zero-cache:4848"
      ZERO_CACHE_USER_ID: "system:serviceaccount:tiara-local:sheet-apis"
      SHEET_AUTH_ISSUER: "http://sheet-auth:3000"
      SHEET_AUTH_OAUTH_CLIENT_ID: ${SHEET_APIS_OAUTH_CLIENT_ID:-}
      SHEET_AUTH_OAUTH_CLIENT_SECRET: ${SHEET_APIS_OAUTH_CLIENT_SECRET:-}
      SHEET_AUTH_OAUTH_AUDIENCE: "sheet-apis"
      SHEET_INGRESS_BASE_URL: "http://sheet-ingress-server:3000"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://local-otel-sink:4318}
    secrets:
      - redis_password
    volumes:
      - ./deploy/compose/secrets/google-service-account.json:/.secret/google-service-account.json:ro
      - ./deploy/compose/secrets/sheet-apis-zero-cache-token:/var/run/secrets/tokens/zero-cache-token:ro
    command:
      - sh
      - -ec
      - export REDIS_URL="redis://default:$$(cat /run/secrets/redis_password)@redis:6379"; exec node --use-openssl-ca --enable-source-maps ./dist/index.mjs

  sheet-bot:
    <<: *app-common
    build:
      context: ./packages/sheet-bot
    image: tiara-stack/sheet-bot:local
    depends_on:
      redis:
        condition: service_healthy
      sheet-auth:
        condition: service_healthy
      sheet-ingress-server:
        condition: service_healthy
      local-jwks:
        condition: service_healthy
      local-otel-sink:
        condition: service_healthy
    environment:
      <<: *local-service-account-env
      POD_NAMESPACE: tiara-local
      SHEET_INGRESS_NAMESPACE: tiara-local
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      SHEET_INGRESS_BASE_URL: "http://sheet-ingress-server:3000"
      SHEET_AUTH_ISSUER: "http://sheet-auth:3000"
      SHEET_AUTH_OAUTH_CLIENT_ID: ${SHEET_BOT_OAUTH_CLIENT_ID:-}
      SHEET_AUTH_OAUTH_CLIENT_SECRET: ${SHEET_BOT_OAUTH_CLIENT_SECRET:-}
      SHEET_AUTH_OAUTH_AUDIENCE: "sheet-bot"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://local-otel-sink:4318}
    secrets:
      - redis_password
    command:
      - sh
      - -ec
      - export REDIS_URL="redis://default:$$(cat /run/secrets/redis_password)@redis:6379"; exec node --use-openssl-ca --enable-source-maps ./dist/main.mjs

  sheet-workflows:
    <<: *app-common
    build:
      context: ./packages/sheet-workflows
    image: tiara-stack/sheet-workflows:local
    depends_on:
      postgres:
        condition: service_healthy
      sheet-auth:
        condition: service_healthy
      sheet-ingress-server:
        condition: service_healthy
      local-jwks:
        condition: service_healthy
      local-otel-sink:
        condition: service_healthy
    environment:
      <<: *local-service-account-env
      POD_NAMESPACE: tiara-local
      WORKFLOWS_RUNNER_HOST: "sheet-workflows"
      WORKFLOWS_RUNNER_PORT: "34431"
      WORKFLOWS_RUNNER_LISTEN_HOST: 0.0.0.0
      WORKFLOWS_RUNNER_LISTEN_PORT: "34431"
      SHEET_AUTH_ISSUER: "http://sheet-auth:3000"
      SHEET_AUTH_OAUTH_CLIENT_ID: ${SHEET_WORKFLOWS_OAUTH_CLIENT_ID:-}
      SHEET_AUTH_OAUTH_CLIENT_SECRET: ${SHEET_WORKFLOWS_OAUTH_CLIENT_SECRET:-}
      SHEET_AUTH_OAUTH_AUDIENCE: "sheet-workflows"
      SHEET_INGRESS_BASE_URL: "http://sheet-ingress-server:3000"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://local-otel-sink:4318}
    secrets:
      - postgres_password
    command:
      - sh
      - -ec
      - export POSTGRES_URL="postgres://tiara:$$(cat /run/secrets/postgres_password)@postgres:5432/tiara"; exec node --use-openssl-ca --enable-source-maps ./dist/index.mjs

  sheet-ingress-server:
    <<: *app-common
    build:
      context: ./packages/sheet-ingress-server
    image: tiara-stack/sheet-ingress-server:local
    depends_on:
      sheet-auth:
        condition: service_healthy
      sheet-apis:
        condition: service_healthy
      local-jwks:
        condition: service_healthy
      local-otel-sink:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      SHEET_APIS_BASE_URL: "http://sheet-apis:3000"
      SHEET_WORKFLOWS_BASE_URL: "http://sheet-workflows:3000"
      SHEET_BOT_BASE_URL: "http://sheet-bot:3000"
      SHEET_AUTH_ISSUER: "http://sheet-auth:3000"
      SHEET_AUTH_OAUTH_CLIENT_ID: ${SHEET_INGRESS_OAUTH_CLIENT_ID:-}
      SHEET_AUTH_OAUTH_CLIENT_SECRET: ${SHEET_INGRESS_OAUTH_CLIENT_SECRET:-}
      TRUSTED_ORIGINS: "${TRUSTED_ORIGINS:-http://localhost:3001,http://localhost:3000,http://localhost:3002}"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://local-otel-sink:4318}
    command:
      - sh
      - -ec
      - exec node --use-openssl-ca --enable-source-maps ./dist/index.mjs

  sheet-web:
    <<: *app-common
    build:
      context: ./packages/sheet-web
    image: tiara-stack/sheet-web:local
    depends_on:
      sheet-auth:
        condition: service_healthy
      sheet-ingress-server:
        condition: service_healthy
      local-jwks:
        condition: service_healthy
      local-otel-sink:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      AUTH_BASE_URL: "${SHEET_AUTH_PUBLIC_BASE_URL:-http://localhost:3002}"
      APP_BASE_URL: "${SHEET_WEB_PUBLIC_BASE_URL:-http://localhost:3001}"
      SHEET_APIS_BASE_URL: "${SHEET_INGRESS_PUBLIC_BASE_URL:-http://localhost:3000}"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://local-otel-sink:4318}
    command:
      - sh
      - -ec
      - exec node --use-openssl-ca --enable-source-maps ./.output/server/index.mjs

volumes:
  tiara-postgres-data:
  tiara-redis-data:
  tiara-zero-cache-data:
