name: CI

env:
  HELM_VERSION: v3.18.6

on:
  push:
    branches: ["master"]
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - "*graphite-base*"
  workflow_dispatch:

jobs:
  optimize_ci:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@9bc969adfd43bb790da3b64b543c78c75cef9689 # v0.0.9
        with:
          graphite_token: ${{ secrets.GRAPHITE_TOKEN }}

  workspace_ci:
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip != 'true' || needs.optimize_ci.result != 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version: "22"
          cache: true

      - name: Setup Helm
        shell: bash
        run: |
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Install Dependencies
        run: vp install

      - name: Run Build
        run: vp run -r build

      - name: Run Checks
        run: vp check

      - name: Lint Helm chart
        run: |
          helm lint --strict charts/tiara-stack \
            --values charts/tiara-stack/values.yaml \
            --values charts/tiara-stack/values-production.yaml \
            --set-string global.appImage.registry=lint-validation \
            --set-string global.appImage.tag=lint-validation

      - name: Render Helm chart
        env:
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
          INFISICAL_ADDRESS: ${{ vars.INFISICAL_ADDRESS }}
          ZERO_CACHE_EXISTING_VOLUME_NAME: ${{ vars.ZERO_CACHE_EXISTING_VOLUME_NAME }}
          REGISTRY_NAME: ${{ vars.REGISTRY_NAME }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          source .github/scripts/validate-deploy-vars.sh
          ret=0
          validate_deploy_vars optional || ret=$?
          if [[ $ret -eq 2 ]]; then
            exit 0
          elif [[ $ret -ne 0 ]]; then
            exit 1
          fi

          registry="registry.digitalocean.com/${REGISTRY_NAME}"

          helm template tiara-stack charts/tiara-stack \
            --namespace "${K8S_NAMESPACE}" \
            --values charts/tiara-stack/values.yaml \
            --values charts/tiara-stack/values-production.yaml \
            --set-string "infisical.projectId=${INFISICAL_PROJECT_ID}" \
            --set-string "infisical.connection.address=${INFISICAL_ADDRESS}" \
            --set-string "zeroCache.persistence.existingVolumeName=${ZERO_CACHE_EXISTING_VOLUME_NAME}" \
            --set-string "global.imagePullSecrets[0].name=${REGISTRY_NAME}" \
            --set-string "global.appImage.registry=${registry}" \
            --set-string global.appImage.tag=template-validation

      - name: Upload Docker build artifact (sheet-db-server)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-db-server
          path: packages/sheet-db-server/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-apis)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-apis
          path: packages/sheet-apis/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-workflows)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-workflows
          path: packages/sheet-workflows/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-bot)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-bot
          path: packages/sheet-bot/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-ingress-server)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-ingress-server
          path: packages/sheet-ingress-server/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-auth)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-auth
          path: packages/sheet-auth/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-web)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-web
          path: packages/sheet-web/dist.tar.zst
          if-no-files-found: error

  fallow:
    needs: optimize_ci
    if: github.event_name == 'pull_request' && (needs.optimize_ci.outputs.skip != 'true' || needs.optimize_ci.result != 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Fallow audit
        uses: fallow-rs/fallow@9492a4d98b5c4ca95670716fced39029cc28f375 # v2
        with:
          command: audit
          version: 2.88.2
          fail-on-issues: false
          annotations: true
          comment: true
          review-comments: true
          diff-filter: added
          max-comments: 50

  docker_images:
    needs: workspace_ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: sheet-db-server
            cache_mode: max
          - package: sheet-apis
            cache_mode: min
          - package: sheet-workflows
            cache_mode: min
          - package: sheet-bot
            cache_mode: max
          - package: sheet-ingress-server
            cache_mode: max
          - package: sheet-auth
            cache_mode: max
          - package: sheet-web
            cache_mode: max
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download Docker build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: docker-dist-${{ matrix.package }}
          path: ./packages/${{ matrix.package }}

      - name: Set image tag
        id: vars
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Install doctl
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: digitalocean/action-doctl@135ac0aa0eed4437d547c6f12c364d3006b42824 # v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry with short-lived credentials
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: doctl registry login --expiry-seconds 1200

      - name: Build container image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./packages/${{ matrix.package }}
          file: ./packages/${{ matrix.package }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
          tags: registry.digitalocean.com/${{ vars.REGISTRY_NAME }}/${{ matrix.package }}:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.package }}
          cache-to: type=gha,mode=${{ matrix.cache_mode }},scope=${{ matrix.package }}

  deploy:
    name: Deploy to Production
    needs: docker_images
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set image tag
        id: vars
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Helm
        shell: bash
        run: |
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Install doctl
        uses: digitalocean/action-doctl@135ac0aa0eed4437d547c6f12c364d3006b42824 # v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig with short-lived credentials
        env:
          CLUSTER_NAME: ${{ vars.CLUSTER_NAME }}
        shell: bash
        run: |
          : "${CLUSTER_NAME:?CLUSTER_NAME variable is required}"
          source "$GITHUB_WORKSPACE/.github/scripts/validate-deploy-vars.sh"
          validate_cluster_name CLUSTER_NAME "${CLUSTER_NAME}"
          doctl kubernetes cluster kubeconfig save --expiry-seconds 1800 "${CLUSTER_NAME}"

      - name: Deploy Helm chart to DigitalOcean Kubernetes
        env:
          REGISTRY_NAME: ${{ vars.REGISTRY_NAME }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
          INFISICAL_ADDRESS: ${{ vars.INFISICAL_ADDRESS }}
          ZERO_CACHE_EXISTING_VOLUME_NAME: ${{ vars.ZERO_CACHE_EXISTING_VOLUME_NAME }}
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        shell: bash
        run: |
          source "$GITHUB_WORKSPACE/.github/scripts/validate-deploy-vars.sh"
          validate_deploy_vars required

          namespace="${K8S_NAMESPACE}"
          registry="registry.digitalocean.com/${REGISTRY_NAME}"

          helm upgrade --install tiara-stack "$GITHUB_WORKSPACE/charts/tiara-stack" \
            --namespace "$namespace" \
            --create-namespace \
            --take-ownership \
            --atomic \
            --timeout 10m \
            --values "$GITHUB_WORKSPACE/charts/tiara-stack/values.yaml" \
            --values "$GITHUB_WORKSPACE/charts/tiara-stack/values-production.yaml" \
            --set-string "infisical.projectId=${INFISICAL_PROJECT_ID}" \
            --set-string "infisical.connection.address=${INFISICAL_ADDRESS}" \
            --set-string "zeroCache.persistence.existingVolumeName=${ZERO_CACHE_EXISTING_VOLUME_NAME}" \
            --set-string "global.imagePullSecrets[0].name=${REGISTRY_NAME}" \
            --set-string "global.appImage.registry=${registry}" \
            --set-string "global.appImage.tag=${IMAGE_TAG}"
