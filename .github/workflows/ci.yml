name: CI

env:
  HELM_VERSION: v3.18.6

on:
  push:
    branches: ["master"]
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - "*graphite-base*"
  workflow_dispatch:

jobs:
  optimize_ci:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@9bc969adfd43bb790da3b64b543c78c75cef9689 # v0.0.9
        with:
          graphite_token: ${{ secrets.GRAPHITE_TOKEN }}

  workspace_ci:
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip != 'true' || needs.optimize_ci.result != 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: tiara-stack/setup-vp@291c3e884862fce3e7530351b63f0e8ab12cbc7b # v1
        with:
          version: "0.2.4"
          node-version: "22"
          cache: true

      - name: Setup Helm
        shell: bash
        run: |
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Install Dependencies
        run: vp install

      - name: Run Build
        run: vp run -w build

      - name: Check generated database schemas and assertion baselines
        run: vp run --filter sheet-db-schema schema:check:built

      - name: Build TypeScript project references
        run: vp exec tsgo -b tsconfig.build.json --pretty false

      - name: Run Format
        id: run_format
        continue-on-error: true
        run: vp run -w format

      - name: Run Lint
        id: run_lint
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: vp run -w lint

      - name: Run Test
        id: run_test
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: vp run -w test

      - name: Check Workspace Results
        if: ${{ !cancelled() && (steps.run_format.outcome == 'failure' || steps.run_lint.outcome == 'failure' || steps.run_test.outcome == 'failure') }}
        run: exit 1

      - name: Lint Helm chart
        run: |
          helm lint --strict charts/tiara-stack \
            --values charts/tiara-stack/values.yaml \
            --values charts/tiara-stack/values-production.yaml \
            --set-string global.appImage.registry=lint-validation \
            --set-string global.appImage.tag=lint-validation

      - name: Render Helm chart
        env:
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
          INFISICAL_ADDRESS: ${{ vars.INFISICAL_ADDRESS }}
          ZERO_CACHE_EXISTING_VOLUME_NAME: ${{ vars.ZERO_CACHE_EXISTING_VOLUME_NAME }}
          MEILISEARCH_EXISTING_VOLUME_NAME: ${{ vars.MEILISEARCH_EXISTING_VOLUME_NAME }}
          REGISTRY_NAME: ${{ vars.REGISTRY_NAME }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          source .github/scripts/validate-deploy-vars.sh
          : "${INFISICAL_PROJECT_ID:=ci-template-project}"
          : "${INFISICAL_ADDRESS:=https://infisical.example.invalid}"
          : "${ZERO_CACHE_EXISTING_VOLUME_NAME:=ci-zero-cache}"
          : "${MEILISEARCH_EXISTING_VOLUME_NAME:=ci-meilisearch}"
          : "${REGISTRY_NAME:=ci-registry}"
          : "${K8S_NAMESPACE:=ci-template}"
          validate_deploy_vars strict

          registry="registry.digitalocean.com/${REGISTRY_NAME}"

          helm template tiara-stack charts/tiara-stack \
            --namespace "${K8S_NAMESPACE}" \
            --values charts/tiara-stack/values.yaml \
            --values charts/tiara-stack/values-production.yaml \
            --set-string "infisical.projectId=${INFISICAL_PROJECT_ID}" \
            --set-string "infisical.connection.address=${INFISICAL_ADDRESS}" \
            --set-string "zeroCache.persistence.existingVolumeName=${ZERO_CACHE_EXISTING_VOLUME_NAME}" \
            --set-string "meilisearch.persistence.existingVolumeName=${MEILISEARCH_EXISTING_VOLUME_NAME}" \
            --set-string "global.imagePullSecrets[0].name=${REGISTRY_NAME}" \
            --set-string "global.appImage.registry=${registry}" \
            --set-string global.appImage.tag=template-validation

      - name: Upload Docker build artifact (sheet-db-server)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-db-server
          path: packages/sheet-db-server/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-apis)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-apis
          path: packages/sheet-apis/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-workflows)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-workflows
          path: packages/sheet-workflows/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-bot)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-bot
          path: packages/sheet-bot/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-ingress-server)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-ingress-server
          path: packages/sheet-ingress-server/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-auth)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-auth
          path: packages/sheet-auth/dist.tar.zst
          if-no-files-found: error

      - name: Upload Docker build artifact (sheet-web)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-dist-sheet-web
          path: packages/sheet-web/dist.tar.zst
          if-no-files-found: error

  fallow:
    needs: optimize_ci
    if: github.event_name == 'pull_request' && (needs.optimize_ci.outputs.skip != 'true' || needs.optimize_ci.result != 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite+
        uses: tiara-stack/setup-vp@291c3e884862fce3e7530351b63f0e8ab12cbc7b # v1
        with:
          version: "0.2.4"
          node-version: "22"
          cache: true

      - name: Install Dependencies
        run: vp install

      - name: Generate SheetWeb documentation collections
        run: vp run --filter sheet-web docs:generate

      - name: Run Fallow audit
        uses: fallow-rs/fallow@9492a4d98b5c4ca95670716fced39029cc28f375 # v2
        with:
          command: audit
          version: 2.88.2
          fail-on-issues: true
          annotations: true
          comment: true
          review-comments: true
          diff-filter: added
          max-comments: 50

  fallow_baseline:
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip != 'true' || needs.optimize_ci.result != 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: tiara-stack/setup-vp@291c3e884862fce3e7530351b63f0e8ab12cbc7b # v1
        with:
          version: "0.2.4"
          node-version: "22"
          cache: true

      - name: Install Dependencies
        run: vp install

      - name: Build generated entry points
        run: vp run -w build

      - name: Check full-repo Fallow baseline
        shell: bash
        run: |
          npx fallow@2.88.2 --summary --no-cache \
            | tee fallow-full-repo-summary.txt || true
          npx fallow@2.88.2 dead-code --summary --no-cache --fail-on-issues \
            --baseline .github/fallow-baselines/dead-code.json \
            | tee -a fallow-full-repo-summary.txt
          npx fallow@2.88.2 dupes --summary --no-cache --fail-on-issues \
            --baseline .github/fallow-baselines/dupes.json \
            | tee -a fallow-full-repo-summary.txt
          npx fallow@2.88.2 health --summary --no-cache --fail-on-issues \
            --baseline .github/fallow-baselines/health.json \
            | tee -a fallow-full-repo-summary.txt

      - name: Upload full-repo Fallow baseline
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fallow-full-repo-baseline
          path: |
            .github/fallow-baselines/*.json
            fallow-full-repo-summary.txt
          if-no-files-found: error

  docker_images:
    needs: workspace_ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: sheet-db-server
            cache_mode: max
          - package: sheet-apis
            cache_mode: min
          - package: sheet-workflows
            cache_mode: min
          - package: sheet-bot
            cache_mode: max
          - package: sheet-ingress-server
            cache_mode: max
          - package: sheet-auth
            cache_mode: max
          - package: sheet-web
            cache_mode: max
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download Docker build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: docker-dist-${{ matrix.package }}
          path: ./packages/${{ matrix.package }}

      - name: Set image tag
        id: vars
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Install doctl
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: digitalocean/action-doctl@135ac0aa0eed4437d547c6f12c364d3006b42824 # v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry with short-lived credentials
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: doctl registry login --expiry-seconds 1200

      - name: Build container image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./packages/${{ matrix.package }}
          file: ./packages/${{ matrix.package }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/master' }}
          tags: registry.digitalocean.com/${{ vars.REGISTRY_NAME }}/${{ matrix.package }}:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.package }}
          cache-to: type=gha,mode=${{ matrix.cache_mode }},scope=${{ matrix.package }}

  deploy:
    name: Deploy to Production
    needs: docker_images
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set image tag
        id: vars
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Helm
        shell: bash
        run: |
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Install doctl
        uses: digitalocean/action-doctl@135ac0aa0eed4437d547c6f12c364d3006b42824 # v2.5.1
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig with short-lived credentials
        env:
          CLUSTER_NAME: ${{ vars.CLUSTER_NAME }}
        shell: bash
        run: |
          : "${CLUSTER_NAME:?CLUSTER_NAME variable is required}"
          source "$GITHUB_WORKSPACE/.github/scripts/validate-deploy-vars.sh"
          validate_cluster_name CLUSTER_NAME "${CLUSTER_NAME}"
          doctl kubernetes cluster kubeconfig save --expiry-seconds 1800 "${CLUSTER_NAME}"

      - name: Deploy Helm chart to DigitalOcean Kubernetes
        env:
          REGISTRY_NAME: ${{ vars.REGISTRY_NAME }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
          INFISICAL_ADDRESS: ${{ vars.INFISICAL_ADDRESS }}
          ZERO_CACHE_EXISTING_VOLUME_NAME: ${{ vars.ZERO_CACHE_EXISTING_VOLUME_NAME }}
          MEILISEARCH_EXISTING_VOLUME_NAME: ${{ vars.MEILISEARCH_EXISTING_VOLUME_NAME }}
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        shell: bash
        run: |
          source "$GITHUB_WORKSPACE/.github/scripts/validate-deploy-vars.sh"
          validate_deploy_vars required

          namespace="${K8S_NAMESPACE}"
          registry="registry.digitalocean.com/${REGISTRY_NAME}"

          dump_deploy_diagnostics() {
            echo "::group::Helm release"
            helm status tiara-stack --namespace "$namespace" || true
            helm history tiara-stack --namespace "$namespace" --max 10 || true
            echo "::endgroup::"

            echo "::group::Kubernetes resources"
            kubectl -n "$namespace" get deploy,rs,pods -l app.kubernetes.io/instance=tiara-stack -o wide || true
            kubectl -n "$namespace" get events --sort-by=.lastTimestamp || true
            echo "::endgroup::"

            echo "::group::Pod descriptions"
            kubectl -n "$namespace" describe pods -l app.kubernetes.io/instance=tiara-stack || true
            echo "::endgroup::"

            echo "::group::Pod logs"
            while IFS= read -r pod; do
              echo "## ${pod}"
              kubectl -n "$namespace" logs "$pod" --all-containers --tail=100 || true
              kubectl -n "$namespace" logs "$pod" --all-containers --previous --tail=100 || true
            done < <(kubectl -n "$namespace" get pods -l app.kubernetes.io/instance=tiara-stack -o name || true)
            echo "::endgroup::"
          }

          set +e
          helm upgrade --install tiara-stack "$GITHUB_WORKSPACE/charts/tiara-stack" \
            --namespace "$namespace" \
            --create-namespace \
            --take-ownership \
            --wait \
            --timeout 10m \
            --values "$GITHUB_WORKSPACE/charts/tiara-stack/values.yaml" \
            --values "$GITHUB_WORKSPACE/charts/tiara-stack/values-production.yaml" \
            --set-string "infisical.projectId=${INFISICAL_PROJECT_ID}" \
            --set-string "infisical.connection.address=${INFISICAL_ADDRESS}" \
            --set-string "zeroCache.persistence.existingVolumeName=${ZERO_CACHE_EXISTING_VOLUME_NAME}" \
            --set-string "meilisearch.persistence.existingVolumeName=${MEILISEARCH_EXISTING_VOLUME_NAME}" \
            --set-string "global.imagePullSecrets[0].name=${REGISTRY_NAME}" \
            --set-string "global.appImage.registry=${registry}" \
            --set-string "global.appImage.tag=${IMAGE_TAG}"
          deploy_status=$?
          set -e

          if [[ $deploy_status -ne 0 ]]; then
            dump_deploy_diagnostics
            helm rollback tiara-stack --namespace "$namespace" --wait --timeout 10m || true
            exit "$deploy_status"
          fi

          # The post-install hook bootstraps a new cluster. This deployment job
          # is the primary ongoing incremental sync for every shipped docs image.
          index_job="tiara-stack-docs-index-${IMAGE_TAG}"
          kubectl -n "$namespace" delete "job/${index_job}" --ignore-not-found --wait=true --timeout=30s || {
            echo "Timed out deleting the previous docs index job: ${index_job}" >&2
            kubectl -n "$namespace" get "job/${index_job}" -o yaml || true
            exit 1
          }
          helm template tiara-stack "$GITHUB_WORKSPACE/charts/tiara-stack" \
            --namespace "$namespace" \
            --values "$GITHUB_WORKSPACE/charts/tiara-stack/values.yaml" \
            --values "$GITHUB_WORKSPACE/charts/tiara-stack/values-production.yaml" \
            --show-only templates/meilisearch-index-job.yaml \
            --set-string "infisical.projectId=${INFISICAL_PROJECT_ID}" \
            --set-string "infisical.connection.address=${INFISICAL_ADDRESS}" \
            --set-string "global.imagePullSecrets[0].name=${REGISTRY_NAME}" \
            --set-string "global.appImage.registry=${registry}" \
            --set-string "global.appImage.tag=${IMAGE_TAG}" \
            --set-string "meilisearch.indexingJob.nameSuffix=${IMAGE_TAG}" \
            --set "meilisearch.indexingJob.hook=false" | kubectl -n "$namespace" apply -f -
          kubectl -n "$namespace" wait --for=condition=complete "job/${index_job}" --timeout=5m || {
            kubectl -n "$namespace" logs "job/${index_job}" --all-containers || true
            kubectl -n "$namespace" describe "job/${index_job}" || true
            exit 1
          }
          kubectl -n "$namespace" logs "job/${index_job}" --all-containers
