{{- if .Values.zeroCache.enabled }}
{{- $zeroCacheReplicas := int (default 1 .Values.zeroCache.replicas) -}}
{{- if and .Values.zeroCache.persistence.existingVolumeName (gt $zeroCacheReplicas 1) }}
{{- fail "zeroCache.persistence.existingVolumeName supports only zeroCache.replicas <= 1" }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tiara-stack.zeroCacheName" . }}
  labels:
    {{- include "tiara-stack.labels" . | nindent 4 }}
    app: {{ include "tiara-stack.zeroCacheName" . }}
spec:
  serviceName: {{ include "tiara-stack.zeroCacheHeadlessServiceName" . }}
  replicas: {{ $zeroCacheReplicas }}
  selector:
    matchLabels:
      app: {{ include "tiara-stack.zeroCacheName" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "tiara-stack.zeroCacheName" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "tiara-stack.zeroCacheName" . }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- with (coalesce .Values.zeroCache.nodeSelector .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.zeroCache.tolerations .Values.global.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: zero-cache
          image: {{ printf "%s:%s" .Values.zeroCache.image.repository .Values.zeroCache.image.tag | quote }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.zeroCache.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.zeroCache.resources | nindent 12 }}
          ports:
            - containerPort: 4848
              name: zero-cache-svc
          livenessProbe:
            httpGet:
              path: /keepalive
              port: zero-cache-svc
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /keepalive
              port: zero-cache-svc
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          env:
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.zeroCache.secretRef.name }}
                  key: nodeEnv
            - name: ZERO_REPLICA_FILE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.zeroCache.secretRef.name }}
                  key: zeroReplicaFile
            - name: ZERO_UPSTREAM_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.zeroCache.secretRef.name }}
                  key: zeroUpstreamDb
            - name: ZERO_CVR_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.zeroCache.secretRef.name }}
                  key: zeroCvrDb
            - name: ZERO_CHANGE_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.zeroCache.secretRef.name }}
                  key: zeroChangeDb
            - name: ZERO_APP_PUBLICATIONS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.zeroCache.secretRef.name }}
                  key: zeroAppPublications
            - name: ZERO_QUERY_FORWARD_COOKIES
              value: "true"
            - name: ZERO_QUERY_URL
              value: http://{{ include "tiara-stack.sheetDbServerServiceName" . }}:80/zero/query
            - name: ZERO_MUTATE_FORWARD_COOKIES
              value: "true"
            - name: ZERO_MUTATE_URL
              value: http://{{ include "tiara-stack.sheetDbServerServiceName" . }}:80/zero/mutate
            - name: ZERO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.zeroCache.secretRef.name }}
                  key: zeroAdminPassword
                  optional: true
            - name: ZERO_AUTH_JWKS_URL
              value: http://localhost:15010/openid/v1/jwks
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          volumeMounts:
            - name: zero-cache-pvc
              mountPath: /data
            - name: zero-cache-tmp
              mountPath: /tmp
        - name: envoy
          image: {{ printf "%s:%s" .Values.zeroCache.envoy.image.repository .Values.zeroCache.envoy.image.tag | quote }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.zeroCache.envoy.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.zeroCache.envoy.resources | nindent 12 }}
          command: ["envoy"]
          args: ["-c", "/etc/envoy/envoy.yaml"]
          env:
            - name: TOKEN_REFRESH_INTERVAL_SECONDS
              value: {{ .Values.zeroCache.envoy.tokenRefreshIntervalSeconds | quote }}
          ports:
            - containerPort: 15010
              name: jwks-proxy
            - containerPort: 9901
              name: envoy-admin
            - containerPort: 9902
              name: envoy-health
          livenessProbe:
            httpGet:
              path: /ready
              port: envoy-health
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: envoy-health
              scheme: HTTP
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: zero-cache-envoy-config-volume
              mountPath: /etc/envoy
            - name: envoy-tmp
              mountPath: /tmp
      volumes:
        - name: zero-cache-envoy-config-volume
          configMap:
            name: {{ include "tiara-stack.zeroCacheEnvoyConfigName" . }}
        - name: zero-cache-tmp
          emptyDir: {}
        - name: envoy-tmp
          emptyDir: {}
        {{- if not .Values.zeroCache.persistence.enabled }}
        - name: zero-cache-pvc
          emptyDir: {}
        {{- end }}
  {{- if .Values.zeroCache.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: zero-cache-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.zeroCache.persistence.size }}
        {{- with .Values.zeroCache.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        {{- if and (le $zeroCacheReplicas 1) .Values.zeroCache.persistence.existingVolumeName }}
        volumeName: {{ .Values.zeroCache.persistence.existingVolumeName | quote }}
        {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tiara-stack.zeroCacheHeadlessServiceName" . }}
  labels:
    {{- include "tiara-stack.labels" . | nindent 4 }}
    app: {{ include "tiara-stack.zeroCacheName" . }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: zero-cache-svc
      protocol: TCP
      port: 4848
      targetPort: zero-cache-svc
  selector:
    app: {{ include "tiara-stack.zeroCacheName" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tiara-stack.zeroCacheServiceName" . }}
  labels:
    {{- include "tiara-stack.labels" . | nindent 4 }}
    app: {{ include "tiara-stack.zeroCacheName" . }}
spec:
  ports:
    - name: zero-cache-svc
      protocol: TCP
      port: 4848
      targetPort: zero-cache-svc
  selector:
    app: {{ include "tiara-stack.zeroCacheName" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
