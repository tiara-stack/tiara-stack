{{- $root := . -}}
{{- range $svc := include "tiara-stack.serviceSpecs" . | fromYamlArray }}
{{- $serviceValues := (index ($root.Values.services | default dict) $svc.key) | default dict -}}
{{- if $serviceValues.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ if eq $svc.key "sheetWorkflows" }}{{ include "tiara-stack.sheetWorkflowsName" $root }}{{ else }}{{ $svc.name }}{{ end }}
  labels:
    {{- include "tiara-stack.labels" $root | nindent 4 }}
    app: {{ $svc.name }}
automountServiceAccountToken: false
{{- with $root.Values.global.imagePullSecrets }}
{{- include "tiara-stack.imagePullSecrets" . }}
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.zeroCache.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tiara-stack.zeroCacheName" . }}
  labels:
    {{- include "tiara-stack.labels" . | nindent 4 }}
    app: {{ include "tiara-stack.zeroCacheName" . }}
automountServiceAccountToken: false
{{- with .Values.global.imagePullSecrets }}
{{- include "tiara-stack.imagePullSecrets" . }}
{{- end }}
{{- end }}
