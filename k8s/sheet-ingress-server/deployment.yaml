apiVersion: apps/v1
kind: Deployment
metadata:
  name: sheet-ingress-server
  labels:
    app: sheet-ingress-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sheet-ingress-server
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: sheet-ingress-server
    spec:
      containers:
        - name: sheet-ingress-server
          image: <IMAGE>
          ports:
            - containerPort: 3000
              name: ingress-svc
            - containerPort: 9464
              name: ingress-met
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: sheet-ingress-server-secret
                  key: otelExporterOtlpEndpoint
            - name: SHEET_APIS_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: sheet-ingress-server-secret
                  key: sheetApisBaseUrl
            - name: SHEET_CLUSTER_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: sheet-ingress-server-secret
                  key: sheetClusterBaseUrl
            - name: SHEET_BOT_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: sheet-ingress-server-secret
                  key: sheetBotBaseUrl
            - name: SHEET_AUTH_ISSUER
              valueFrom:
                secretKeyRef:
                  name: sheet-ingress-server-secret
                  key: sheetAuthIssuer
            - name: TRUSTED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: sheet-ingress-server-secret
                  key: trustedOrigins
          livenessProbe:
            httpGet:
              path: /health
              port: ingress-svc
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: ingress-svc
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: ingress-svc
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          volumeMounts:
            - name: sheet-ingress-server-tokens
              readOnly: true
              mountPath: "/var/run/secrets/tokens"
            - name: sheet-ingress-server-ca-certificate
              readOnly: true
              mountPath: "/usr/local/share/ca-certificates/tiarastack"
      serviceAccountName: sheet-ingress-server
      volumes:
        - name: sheet-ingress-server-tokens
          projected:
            sources:
              - serviceAccountToken:
                  path: sheet-auth-token
                  expirationSeconds: 3600
                  audience: sheet-auth
              - serviceAccountToken:
                  path: sheet-apis-token
                  expirationSeconds: 3600
                  audience: sheet-apis
              - serviceAccountToken:
                  path: sheet-cluster-token
                  expirationSeconds: 3600
                  audience: sheet-cluster
              - serviceAccountToken:
                  path: sheet-bot-token
                  expirationSeconds: 3600
                  audience: sheet-bot
        - name: sheet-ingress-server-ca-certificate
          configMap:
            name: sheet-ingress-server-ca-certificate
            items:
              - key: ca-certificate.crt
                path: tiarastack.crt
---
apiVersion: v1
kind: Service
metadata:
  name: sheet-ingress-server-service
  labels:
    app: sheet-ingress-server
spec:
  ports:
    - name: ingress-svc
      protocol: TCP
      port: 80
      targetPort: ingress-svc
    - name: ingress-met
      protocol: TCP
      port: 9464
      targetPort: ingress-met
  selector:
    app: sheet-ingress-server
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sheet-ingress-server
  labels:
    app: sheet-ingress-server
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: sheet-ingress-server
  endpoints:
    - port: ingress-met
