apiVersion: apps/v1
kind: Deployment
metadata:
  name: sheet-bot
  labels:
    app: sheet-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sheet-bot
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: sheet-bot
    spec:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: sheet-bot
          image: <IMAGE>
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
              name: sheet-bot-svc
            - containerPort: 9464
              name: sheet-bot-met
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: sheet-bot-secret
                  key: otelExporterOtlpEndpoint
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sheet-bot-secret
                  key: discordToken
            - name: DISCORD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sheet-bot-secret
                  key: discordClientId
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: sheet-bot-secret
                  key: redisUrl
            - name: SHEET_INGRESS_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: sheet-bot-secret
                  key: sheetIngressBaseUrl
            - name: SHEET_AUTH_ISSUER
              valueFrom:
                secretKeyRef:
                  name: sheet-bot-secret
                  key: sheetAuthIssuer
            - name: SHEET_INGRESS_KUBERNETES_AUDIENCE
              value: sheet-bot
          volumeMounts:
            - name: sheet-bot-tokens
              readOnly: true
              mountPath: "/var/run/secrets/tokens"
            - name: sheet-bot-ca-certificate
              readOnly: true
              mountPath: "/usr/local/share/ca-certificates/tiarastack"
            - name: sheet-bot-tmp
              mountPath: "/tmp"
      serviceAccountName: sheet-bot
      volumes:
        - name: sheet-bot-tokens
          projected:
            sources:
              - serviceAccountToken:
                  path: sheet-auth-token
                  expirationSeconds: 3600
                  audience: sheet-auth
        - name: sheet-bot-ca-certificate
          configMap:
            name: sheet-bot-ca-certificate
            items:
              - key: ca-certificate.crt
                path: tiarastack.crt
        - name: sheet-bot-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sheet-bot-service
  labels:
    app: sheet-bot
spec:
  ports:
    - name: sheet-bot-svc
      protocol: TCP
      port: 80
      targetPort: sheet-bot-svc
    - name: sheet-bot-met
      protocol: TCP
      port: 9464
      targetPort: sheet-bot-met
  selector:
    app: sheet-bot
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sheet-bot
  labels:
    app: sheet-bot
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: sheet-bot
  endpoints:
    - port: sheet-bot-met
